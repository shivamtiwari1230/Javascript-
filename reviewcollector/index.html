<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container padding-tb">
        <div class="row">
            <div class="col-md-6 wrap">
                <div class="background">
                    <h1 class="align-center">Share Your Experience</h1>
                    <p>Please rate your experience and leave a review. Your feedback helps us improve.
                    </p>
                    <div class="review-form">
                        <form action="#">
                            <div class="text-area">
                                <div class="input">
                                    <label for="Name">Your Name</label>
                                    <input type="text" id="name" placeholder="Enter Your Name" required>
                                </div>

                                <div class="input">
                                    <label for="Name">Write Your Review</label>
                                    <textarea name="name" id="Reviews" required></textarea>
                                </div>

                                <div class="input-star">
                                    <i class="fa-regular fa-star"></i>
                                    <i class="fa-regular fa-star"></i>
                                    <i class="fa-regular fa-star"></i>
                                    <i class="fa-regular fa-star"></i>
                                    <i class="fa-regular fa-star"></i>
                                </div>

                                <div class="btnn">
                                    <button id="button">Sumit Now</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6 wrap">
                <div class="background">
                    <h1>Your Reviews</h1>
                    <p>Please rate your experience and leave a review. Your feedback helps us improve.
                    </p>
                    <div id="show-review">

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

<script>
    

    let name = document.getElementById("name")
    let writeReview = document.getElementById("Reviews")
    let btn = document.getElementById("button")
    let showReview = document.getElementById("show-review")
    let stars = document.querySelectorAll(".input-star i")
    // console.log(stars);

    let selectRating = 0
    
    stars.forEach((el, index) => {
        el.addEventListener("click", () => {

            stars.forEach((elev) => {
                elev.style.color = ""
                elev.classList.remove("fa-solid")
            });


            for(let i = 0; i <= index; i++){
                stars[i].classList.add("fa-star", "fa-solid")
                stars[i].style.color = "gold"
            }
            
        

        });
    });

    

    btn.addEventListener("click", (e) => {
        e.preventDefault()
        const nameVal = name.value
        const writeVal = writeReview.value

    const reviewName = document.createElement("h3")
    const review = document.createElement("p")
    review.setAttribute("class", "text")

    reviewName.innerText = nameVal
    review.innerText = writeVal

    showReview.appendChild(reviewName);
    showReview.appendChild(review);

    });




</script>

</html>
